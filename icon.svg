<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="100" fill="#0a0a0f"/>
  <!-- battery body -->
  <rect x="136" y="140" width="240" height="300" rx="24" fill="none" stroke="#2a2a40" stroke-width="14"/>
  <!-- battery tip -->
  <rect x="206" y="110" width="100" height="36" rx="10" fill="#2a2a40"/>
  <!-- fill green -->
  <rect x="150" y="290" width="212" height="135" rx="14" fill="url(#g1)"/>
  <!-- highlight -->
  <rect x="150" y="290" width="212" height="40" rx="14" fill="rgba(255,255,255,0.08)"/>
  <!-- limit line orange -->
  <rect x="136" y="240" width="240" height="4" rx="2" fill="#ff6b35" opacity="0.85"/>
  <!-- limit line cyan -->
  <rect x="136" y="360" width="240" height="4" rx="2" fill="#00e5ff" opacity="0.85"/>
  <!-- percentage text -->
  <text x="256" y="230" text-anchor="middle" font-family="sans-serif" font-size="72" font-weight="900" fill="white">%</text>
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88"/>
      <stop offset="100%" stop-color="#00cc66"/>
    </linearGradient>
  </defs>
</svg>
